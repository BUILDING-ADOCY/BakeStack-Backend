services:
  postgres:
    image: postgres:16-alpine
    container_name: bakestack-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakestack_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - bakestack_backend_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakestack_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bakestack_backend_postgres:
